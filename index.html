<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kayoli / projects</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: sans-serif; min-height: 100vh; }
    .page { max-width: 700px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .header { margin-bottom: 2.5rem; }
    .header h1 { font-size: 22px; font-weight: 500; color: #f0f0f0; margin-bottom: 2px; }
    .header span { font-size: 13px; color: #555; font-family: monospace; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .card { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 1.25rem; cursor: pointer; text-decoration: none; display: block; transition: border-color 0.15s, background 0.15s; }
    .card:hover { background: #222; border-color: #444; }
    .card-icon { margin-bottom: 14px; }
    .card-icon svg { width: 22px; height: 22px; stroke: #888; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .card-title { font-size: 15px; font-weight: 500; color: #e8e8e8; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>My Projects</h1>
      <span>kayoli / projects</span>
    </div>
    <div class="grid">

      <a href="hesapmakinesi.html" class="card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <rect x="6" y="6" width="12" height="3.5" rx="0.5"/>
            <circle cx="7.5" cy="14" r="1" fill="#888" stroke="none"/>
            <circle cx="12" cy="14" r="1" fill="#888" stroke="none"/>
            <circle cx="16.5" cy="14" r="1" fill="#888" stroke="none"/>
            <circle cx="7.5" cy="17.5" r="1" fill="#888" stroke="none"/>
            <circle cx="12" cy="17.5" r="1" fill="#888" stroke="none"/>
            <circle cx="16.5" cy="17.5" r="1" fill="#888" stroke="none"/>
          </svg>
        </div>
        <div class="card-title">Hesap Makinesi</div>
      </a>
      <a href="saat/index.html" class="card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/>
            <polyline points="12 7 12 12 15 15" />
          </svg>
        </div>
        <div class="card-title">Saat Uygulaması</div>
      </a>

    </div>
  </div>
</body>
</html>
