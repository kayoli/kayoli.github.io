<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarif Saat Arayüzü</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0f;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --primary-glow: #00f0ff;
            --secondary-glow: #bc13fe;
            --text-main: #ffffff;
            --text-muted: #888899;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.05), transparent 50%),
                              radial-gradient(circle at 50% 100%, rgba(188, 19, 254, 0.05), transparent 50%);
        }

        .app-container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            width: 400px;
            height: 550px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Sekmeler (Tabs) */
        .tabs {
            display: flex;
            justify-content: space-around;
            padding: 20px 10px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .tab-btn i { font-size: 1.2rem; }

        .tab-btn.active {
            color: var(--primary-glow);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            transform: translateY(-2px);
        }

        /* İçerik Alanı */
        .content-area {
            flex: 1;
            position: relative;
        }

        .panel {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .panel.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        /* Tipografi ve Işıltı */
        .glow-text {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            text-shadow: 0 0 15px var(--primary-glow), 0 0 30px rgba(0, 240, 255, 0.3);
        }

        .time-display {
            font-size: 3rem;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        .date-display, .location-status, .status-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .day-night-indicator {
            font-size: 2rem;
            margin-top: 20px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            animation: pulse 3s infinite;
        }

        /* Özel Şık Alarm UI */
        .alarm-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .time-setter {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .setter-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .arrow-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .arrow-btn:hover {
            color: var(--primary-glow);
            transform: scale(1.2);
        }

        .setter-value {
            font-size: 3.5rem;
            width: 80px;
            text-align: center;
            user-select: none;
        }

        .colon {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--primary-glow);
            animation: blink 1s infinite;
        }

        /* Butonlar ve Girdiler */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(188, 19, 254, 0.3);
        }

        .action-btn:hover {
            box-shadow: 0 5px 25px rgba(0, 240, 255, 0.5);
            transform: translateY(-2px);
        }

        .action-btn.secondary {
            background: transparent;
            border: 1px solid var(--text-muted);
            box-shadow: none;
        }

        .action-btn.secondary:hover {
            border-color: #fff;
        }

        .timer-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .glass-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            width: 80px;
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            outline: none;
            transition: border 0.3s;
        }

        .glass-input:focus {
            border-color: var(--primary-glow);
        }

        .hidden { display: none !important; }

        /* Animasyonlar */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .pop-animation {
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <nav class="tabs">
            <button class="tab-btn active" data-target="world-clock"><i class="fa-solid fa-earth-americas"></i> Dünya</button>
            <button class="tab-btn" data-target="alarm"><i class="fa-solid fa-bell"></i> Alarm</button>
            <button class="tab-btn" data-target="stopwatch"><i class="fa-solid fa-stopwatch"></i> Kronometre</button>
            <button class="tab-btn" data-target="timer"><i class="fa-solid fa-hourglass-half"></i> Zamanlayıcı</button>
        </nav>

        <main class="content-area">
            
            <section id="world-clock" class="panel active">
                <div class="location-status" id="location-status">Konum aranıyor...</div>
                <div class="time-display glow-text" id="current-time">00:00:00</div>
                <div class="date-display" id="current-date">--</div>
                <div class="day-night-indicator" id="dn-indicator">
                    <i class="fa-solid fa-sun"></i>
                </div>
            </section>

            <section id="alarm" class="panel">
                <div class="alarm-ui">
                    <div class="time-setter">
                        <div class="setter-column">
                            <button class="arrow-btn" onclick="adjustTime('hour', 1)"><i class="fa-solid fa-chevron-up"></i></button>
                            <div class="setter-value glow-text" id="alarm-hour">07</div>
                            <button class="arrow-btn" onclick="adjustTime('hour', -1)"><i class="fa-solid fa-chevron-down"></i></button>
                        </div>
                        <span class="colon">:</span>
                        <div class="setter-column">
                            <button class="arrow-btn" onclick="adjustTime('minute', 1)"><i class="fa-solid fa-chevron-up"></i></button>
                            <div class="setter-value glow-text" id="alarm-minute">30</div>
                            <button class="arrow-btn" onclick="adjustTime('minute', -1)"><i class="fa-solid fa-chevron-down"></i></button>
                        </div>
                    </div>
                    <button class="action-btn" id="set-alarm-btn">Alarmı Kur</button>
                </div>
                <div id="active-alarm-text" class="status-text"></div>
            </section>

            <section id="stopwatch" class="panel">
                <div class="time-display glow-text" id="stopwatch-display">00:00:00.00</div>
                <div class="controls">
                    <button class="action-btn" id="sw-start">Başlat</button>
                    <button class="action-btn secondary" id="sw-reset">Sıfırla</button>
                </div>
            </section>

            <section id="timer" class="panel">
                <div class="timer-inputs" id="timer-setup">
                    <input type="number" id="timer-m" placeholder="Dk" min="0" max="59" class="glass-input">
                    <span class="colon">:</span>
                    <input type="number" id="timer-s" placeholder="Sn" min="0" max="59" class="glass-input">
                </div>
                <div class="time-display glow-text hidden" id="timer-display">00:00</div>
                <div class="controls">
                    <button class="action-btn" id="timer-start">Başlat</button>
                    <button class="action-btn secondary" id="timer-reset">İptal</button>
                </div>
            </section>

        </main>
    </div>

    <script>
        // --- Sekme (Tab) Mantığı ---
        const tabBtns = document.querySelectorAll('.tab-btn');
        const panels = document.querySelectorAll('.panel');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Aktif sınıfları temizle
                tabBtns.forEach(b => b.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));
                
                // Yenisini ekle
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });

        // --- 1. Dünya Saati ve Konum ---
        let userTimezone = null;
        const timeDisplay = document.getElementById('current-time');
        const dateDisplay = document.getElementById('current-date');
        const locationStatus = document.getElementById('location-status');
        const dnIndicator = document.getElementById('dn-indicator');

        // Konum İzni İsteme ve Ayarlama
        function initLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        // İzin verildi, sistemin yerel saatini kullanıyoruz.
                        userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                        locationStatus.innerText = `Konum: ${userTimezone.split('/')[1].replace('_', ' ')}`;
                    },
                    (error) => {
                        // İzin reddedildi veya hata oluştu -> Varsayılan İstanbul
                        userTimezone = "Europe/Istanbul";
                        locationStatus.innerText = "Konum reddedildi. Varsayılan: İstanbul";
                    }
                );
            } else {
                userTimezone = "Europe/Istanbul";
            }
        }

        function updateWorldClock() {
            if (!userTimezone) return;

            const now = new Date();
            const optionsTime = { timeZone: userTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const optionsDate = { timeZone: userTimezone, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            
            const timeString = new Intl.DateTimeFormat('tr-TR', optionsTime).format(now);
            const dateString = new Intl.DateTimeFormat('tr-TR', optionsDate).format(now);
            
            timeDisplay.innerText = timeString;
            dateDisplay.innerText = dateString;

            // Gece/Gündüz Göstergesi (Sabah 6 ile Akşam 18 arası gündüz kabul edildi)
            const hour = parseInt(timeString.split(':')[0]);
            if (hour >= 6 && hour < 18) {
                dnIndicator.innerHTML = '<i class="fa-solid fa-sun"></i>';
                dnIndicator.style.color = "#ffd700"; // Sarı güneş
            } else {
                dnIndicator.innerHTML = '<i class="fa-solid fa-moon"></i>';
                dnIndicator.style.color = "#00f0ff"; // Mavi ay
            }
        }

        setInterval(updateWorldClock, 1000);
        initLocation();

        // --- 2. Özel Şık Alarm ---
        let alarmHour = 7;
        let alarmMinute = 30;
        let alarmSet = false;

        const hourEl = document.getElementById('alarm-hour');
        const minuteEl = document.getElementById('alarm-minute');
        const statusText = document.getElementById('active-alarm-text');

        function adjustTime(type, amount) {
            if (type === 'hour') {
                alarmHour = (alarmHour + amount + 24) % 24;
                hourEl.innerText = alarmHour.toString().padStart(2, '0');
                animateElement(hourEl);
            } else {
                alarmMinute = (alarmMinute + amount + 60) % 60;
                minuteEl.innerText = alarmMinute.toString().padStart(2, '0');
                animateElement(minuteEl);
            }
        }

        function animateElement(el) {
            el.classList.remove('pop-animation');
            void el.offsetWidth; // Reflow tetikle (animasyonu yeniden başlatmak için)
            el.classList.add('pop-animation');
        }

        document.getElementById('set-alarm-btn').addEventListener('click', () => {
            alarmSet = true;
            const hText = alarmHour.toString().padStart(2, '0');
            const mText = alarmMinute.toString().padStart(2, '0');
            statusText.innerText = `Alarm ${hText}:${mText} için kuruldu.`;
        });

        // Alarm Kontrol Döngüsü
        setInterval(() => {
            if (!alarmSet || !userTimezone) return;
            const now = new Date();
            const optionsTime = { timeZone: userTimezone, hour: '2-digit', minute: '2-digit', hour12: false };
            const currentTime = new Intl.DateTimeFormat('tr-TR', optionsTime).format(now);
            
            const alarmTimeStr = `${alarmHour.toString().padStart(2,'0')}:${alarmMinute.toString().padStart(2,'0')}`;
            
            if (currentTime === alarmTimeStr && now.getSeconds() === 0) {
                alert(`⏰ ALARM VAKTİ! Saat: ${alarmTimeStr}`);
                alarmSet = false;
                statusText.innerText = "";
            }
        }, 1000);

        // --- 3. Kronometre ---
        let swStartTime;
        let swInterval;
        let swRunning = false;
        let swElapsedTime = 0;
        const swDisplay = document.getElementById('stopwatch-display');
        const swStartBtn = document.getElementById('sw-start');

        function updateStopwatch() {
            const now = Date.now();
            const diff = now - swStartTime + swElapsedTime;
            
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const ms = Math.floor((diff % 1000) / 10);
            
            swDisplay.innerText = 
                `${h > 0 ? h.toString().padStart(2,'0') + ':' : ''}` +
                `${m.toString().padStart(2,'0')}:` +
                `${s.toString().padStart(2,'0')}.` +
                `${ms.toString().padStart(2,'0')}`;
        }

        swStartBtn.addEventListener('click', () => {
            if (!swRunning) {
                swStartTime = Date.now();
                swInterval = setInterval(updateStopwatch, 10);
                swStartBtn.innerText = "Durdur";
                swRunning = true;
            } else {
                clearInterval(swInterval);
                swElapsedTime += Date.now() - swStartTime;
                swStartBtn.innerText = "Devam Et";
                swRunning = false;
            }
        });

        document.getElementById('sw-reset').addEventListener('click', () => {
            clearInterval(swInterval);
            swRunning = false;
            swElapsedTime = 0;
            swDisplay.innerText = "00:00:00.00";
            swStartBtn.innerText = "Başlat";
        });

        // --- 4. Zamanlayıcı (Timer) ---
        let timerInterval;
        let timerSeconds = 0;
        const timerSetup = document.getElementById('timer-setup');
        const timerDisplay = document.getElementById('timer-display');
        const timerStartBtn = document.getElementById('timer-start');

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            timerDisplay.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        timerStartBtn.addEventListener('click', () => {
            if (timerStartBtn.innerText === "Başlat") {
                const mInput = parseInt(document.getElementById('timer-m').value) || 0;
                const sInput = parseInt(document.getElementById('timer-s').value) || 0;
                timerSeconds = (mInput * 60) + sInput;
                
                if (timerSeconds <= 0) return;

                timerSetup.classList.add('hidden');
                timerDisplay.classList.remove('hidden');
                updateTimerDisplay();
                
                timerStartBtn.innerText = "Durdur";
                
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    updateTimerDisplay();
                    
                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        alert("Zaman doldu!");
                        resetTimer();
                    }
                }, 1000);
            } else {
                clearInterval(timerInterval);
                timerStartBtn.innerText = "Başlat";
            }
        });

        function resetTimer() {
            clearInterval(timerInterval);
            timerSetup.classList.remove('hidden');
            timerDisplay.classList.add('hidden');
            timerStartBtn.innerText = "Başlat";
            document.getElementById('timer-m').value = '';
            document.getElementById('timer-s').value = '';
        }

        document.getElementById('timer-reset').addEventListener('click', resetTimer);
    </script>
</body>
</html>
